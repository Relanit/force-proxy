name: Build DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Enable vcpkg integration
      run: vcpkg integrate install

    - name: Disable Precompiled Headers (Fix x86 build)
      run: |
        $proj = "src/force-proxy.vcxproj"
        $content = Get-Content $proj
        # Находим все теги PrecompiledHeader и меняем их значение на NotUsing
        $content = $content -replace '<PrecompiledHeader[^>]*>.*?</PrecompiledHeader>', '<PrecompiledHeader>NotUsing</PrecompiledHeader>'
        Set-Content -Path $proj -Value $content

    - name: Restore NuGet packages
      run: nuget restore force-proxy.sln

    - name: Build x64 Release
      run: msbuild force-proxy.sln /p:Configuration=Release /p:Platform=x64

    - name: Build x86 Release
      run: msbuild force-proxy.sln /p:Configuration=Release /p:Platform=x86

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ForceProxy-DLLs
        path: |
          x64/Release/*.dll
          Release/*.dll
          */Release/*.dll
