name: Build DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install Detours via vcpkg
      run: |
        # Интегрируем vcpkg и скачиваем Detours под обе архитектуры
        vcpkg integrate install
        vcpkg install detours:x64-windows detours:x86-windows

    - name: Patch hardcoded Detours paths
      run: |
        # 1. Заменяем жесткие пути в коде: "detours/detours.h" -> <detours.h>
        Get-ChildItem -Path src -Include *.cpp,*.h -Recurse | ForEach-Object {
            $content = Get-Content $_.FullName
            $content = $content -replace '["<]detours/detours\.h[">]', '<detours.h>'
            $content = $content -replace '"[^"]*detours\.lib"', '"detours.lib"'
            Set-Content -Path $_.FullName -Value $content
        }
        
        # 2. Убираем пути к несуществующим папкам detours.lib в настройках проекта
        $proj = "src/force-proxy.vcxproj"
        if (Test-Path $proj) {
            $content = Get-Content $proj
            $content = $content -replace '[a-zA-Z0-9_\\\/\-\.]*detours\.lib', 'detours.lib'
            Set-Content -Path $proj -Value $content
        }

    - name: Restore NuGet packages
      run: nuget restore force-proxy.sln

    - name: Build x64 Release
      run: msbuild force-proxy.sln /p:Configuration=Release /p:Platform=x64

    - name: Build x86 Release
      run: msbuild force-proxy.sln /p:Configuration=Release /p:Platform=x86

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ForceProxy-DLLs
        path: |
          x64/Release/*.dll
          Release/*.dll
          */Release/*.dll
